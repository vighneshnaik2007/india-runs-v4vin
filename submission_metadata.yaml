# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  No candidate data was fed to any LLM. All scoring logic, embeddings,
  and ranking pipeline were written and executed locally.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid AI scoring system with three components:
  1. Semantic similarity (55% weight): Used sentence-transformers
  (all-MiniLM-L6-v2) to convert job description and all 1,00,000 candidate
  profiles into vector embeddings. Cosine similarity measures semantic fit
  beyond keyword matching.
  2. Behavioral signal scoring (25% weight): Leveraged 23 Redrob platform
  signals including login recency, recruiter response rate, profile
  completeness, saved by recruiters, and interview completion rate to
  assess candidate seriousness and platform engagement.
  3. Rule-based scoring (20% weight): Applied JD-specific rules — bonus
  for 5-9 years experience, India location (Pune/Noida/Hyderabad preferred),
  AI/ML title relevance. Penalty for consulting-only backgrounds (TCS,
  Infosys, Wipro etc.) as explicitly stated in JD.
  Embeddings are precomputed offline (~150 min) and saved as numpy array.
  Final ranking runs in under 2 minutes on CPU within 16GB RAM.

